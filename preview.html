<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaTech - A sua Loja de Eletrônicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #1e3a8a;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            transition: background-color 0.3s ease;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        body.light-theme .card {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        }
        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #8aadf4, #b7bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }
        body.light-theme h1 {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .secao {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }
        body.light-theme .secao {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: #8aadf4;
            letter-spacing: -0.02em;
        }
        body.light-theme h2 {
            color: #1e3a8a;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.65;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #8aadf4, #789be3);
            color: #1e1e2e !important;
            font-weight: 700;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(138, 173, 244, 0.35);
            transition: all 0.3s ease;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 173, 244, 0.5);
            background: linear-gradient(135deg, #789be3, #8aadf4);
        }
        body.light-theme .btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff !important;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }
        body.light-theme .btn:hover {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }
        .img-fluid {
            max-width: 100%;
            height: auto;
            border-radius: 14px;
            margin: 15px 0 25px 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }
        body.light-theme .img-fluid {
            border: 2px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.55;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        body.light-theme footer {
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body >
    <div class="card">
        <header>
            <h1>MegaTech - A sua Loja de Eletrônicos</h1>
        </header>
        <main>
    
            <div class="secao">
                <h2>Promoção de Outono</h2>
                            <p>Notebooks e periféricos com até 40% de desconto e frete grátis</p>
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=600&q=80" class="img-fluid" alt="Imagem da Seção">
                <a href="https://megatech.com/promocoes" target="_blank" class="btn">Garantir Desconto</a>
            </div>

            <div class="secao">
                <h2>Fale Conosco</h2>
                            <p>Dúvidas? Fale com nosso suporte 24 horas por dia</p>
                <a href="https://wa.me/megatech" target="_blank" class="btn">Iniciar Chat no WhatsApp</a>
            </div>

        </main>
        <footer>
            <p>Gerado automaticamente pelo Compilador Websimples &copy; 2026</p>
        </footer>
    </div>
</body>
</html>
